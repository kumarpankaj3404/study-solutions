<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 250" width="100%" height="100%">
    <defs>
        <linearGradient id="dayGradient" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0052CC" />
            <stop offset="100%" stop-color="#00B8D9" />
        </linearGradient>

        <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <g transform="translate(-110, -30) scale(0.55)">
        
        <path d="M 390 405
                 C 350 385, 270 365, 220 365
                 L 220 440
                 C 270 440, 350 460, 390 475
                 Z" 
              fill="url(#dayGradient)" />

        <path d="M 410 405
                 C 450 385, 530 365, 580 365
                 L 580 440
                 C 530 440, 450 460, 410 475
                 Z" 
              fill="url(#dayGradient)" />

        <rect x="390" y="140" width="20" height="250" rx="10" fill="url(#dayGradient)" />
        <rect x="340" y="200" width="20" height="180" rx="10" fill="url(#dayGradient)" />
        <rect x="290" y="240" width="20" height="125" rx="10" fill="url(#dayGradient)" />
        <rect x="240" y="280" width="20" height="70" rx="10" fill="url(#dayGradient)" />
        <rect x="440" y="180" width="20" height="200" rx="10" fill="url(#dayGradient)" />
        <rect x="490" y="220" width="20" height="145" rx="10" fill="url(#dayGradient)" />
        <rect x="540" y="260" width="20" height="90" rx="10" fill="url(#dayGradient)" />

        <path d="M 230,150 Q 250,150 250,130 Q 250,150 270,150 Q 250,150 250,170 Q 250,150 230,150 Z" 
              fill="#00B8D9" filter="url(#softGlow)"/>
        <path d="M 540,110 Q 560,110 560,90 Q 560,110 580,110 Q 560,110 560,130 Q 560,110 540,110 Z" 
              fill="#0052CC" filter="url(#softGlow)"/>
        <path d="M 600,200 Q 610,200 610,190 Q 610,200 620,200 Q 610,200 610,210 Q 610,200 600,200 Z" 
              fill="#00B8D9" opacity="0.6"/>
    </g>

    <text x="240" y="135" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="72" 
          text-anchor="start" 
          letter-spacing="2">
        <tspan font-weight="900" fill="#0A192F">STUDY</tspan>
        <tspan font-weight="400" fill="#0052CC"> SOLUTIONS</tspan>
    </text>

    <text x="245" y="185" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-weight="600" 
          font-size="20" 
          fill="#42526E" 
          text-anchor="start" 
          letter-spacing="5">
        AI VOICE LEARNING PLATFORM
    </text>
</svg>